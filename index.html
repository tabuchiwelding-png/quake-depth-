<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>震源 3D</title>
<meta name="description" content="日本周辺の地震を3Dで探検。震源を実際の深さで立体表示し、傾けて回して見る。深さで色分け。気象庁(P2P)/USGS。">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/deck.gl@8.9.35/dist.min.js"></script>
<style>
:root{
  --ink:#05080d; --text:#eaf1f8; --muted:#8794a4; --dim:#54616f; --line:#1b2733;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --sans:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--ink);color:var(--text);font-family:var(--sans);-webkit-text-size-adjust:100%;}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
#map{position:fixed;inset:0;}
.maplibregl-ctrl-attrib{font-size:9px!important;background:rgba(5,8,13,.5)!important;}
.maplibregl-ctrl-attrib a{color:#5a83b0!important;}
.maplibregl-ctrl-bottom-right{margin-bottom:calc(2px + var(--sb));}

/* 上：最小ワードマーク */
.top{position:fixed;left:14px;top:calc(12px + var(--st));z-index:10;display:flex;align-items:baseline;gap:9px;pointer-events:none;}
.brand{font-size:17px;font-weight:600;letter-spacing:.02em;}
.brand b{color:#ff5b4a;}
.tsub{font-family:var(--mono);font-size:11px;color:var(--muted);}
.tools{position:fixed;right:12px;top:calc(10px + var(--st));z-index:10;display:flex;gap:8px;}
.tbtn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:rgba(10,16,23,.66);color:var(--text);
  font-size:16px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}

/* 深さ凡例 */
.legend{position:fixed;left:14px;bottom:calc(14px + var(--sb));z-index:10;font-family:var(--mono);font-size:10px;color:var(--muted);pointer-events:none;}
.legend .t{color:var(--dim);margin-bottom:6px;letter-spacing:.04em;}
.lr{display:flex;align-items:center;gap:7px;margin:3px 0;}
.lr i{width:11px;height:11px;border-radius:3px;}

/* 選択カード */
.info{position:fixed;left:12px;right:12px;bottom:calc(14px + var(--sb));z-index:12;background:rgba(9,14,20,.92);
  border:1px solid var(--line);border-radius:15px;padding:13px 14px;backdrop-filter:blur(12px);
  transform:translateY(140%);transition:transform .3s cubic-bezier(.2,.85,.25,1);box-shadow:0 10px 40px rgba(0,0,0,.5);}
.info.on{transform:translateY(0);}
.info .x{position:absolute;right:8px;top:8px;width:30px;height:30px;border:0;background:transparent;color:var(--muted);font-size:17px;}
.info .h{display:flex;align-items:center;gap:10px;}
.info .dh{flex:0 0 auto;width:8px;height:34px;border-radius:3px;}
.info .pl{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:26px;}
.info .g{display:flex;gap:18px;margin-top:10px;}
.info .g div{display:flex;flex-direction:column;gap:2px;}
.info .g .k{font-size:10px;color:var(--dim);font-family:var(--mono);letter-spacing:.05em;}
.info .g .vv{font-family:var(--mono);font-size:16px;font-weight:600;}
.info .sb{font-size:10px;color:var(--dim);font-family:var(--mono);}

/* 一覧シート */
.bg{position:fixed;inset:0;background:rgba(2,4,7,.55);z-index:20;opacity:0;pointer-events:none;transition:opacity .25s;}
.bg.on{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:30;height:78%;background:var(--ink);border-top:1px solid var(--line);
  border-radius:18px 18px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.85,.25,1);display:flex;flex-direction:column;}
.sheet.on{transform:translateY(0);}
.hd{width:38px;height:4px;border-radius:2px;background:#283643;margin:10px auto 4px;}
.st{text-align:center;font-family:var(--mono);font-size:10px;color:var(--dim);padding-bottom:8px;letter-spacing:.05em;}
.st b{color:var(--muted);}
.list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 12px calc(18px + var(--sb));}
.row{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid #101a24;}
.row:active{background:#0a121a;}
.rb{flex:0 0 auto;width:42px;height:42px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;color:#05080d;}
.rb .k{font-family:var(--mono);font-size:8px;font-weight:600;}.rb .v{font-family:var(--mono);font-weight:600;font-size:17px;}
.rm{flex:1;min-width:0;}
.rp{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rs{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;}
.rt{flex:0 0 auto;font-family:var(--mono);font-size:11px;color:var(--dim);}

.toast{position:fixed;left:50%;bottom:calc(20px + var(--sb));transform:translateX(-50%);z-index:40;background:#0b141d;
  border:1px solid var(--line);color:var(--text);padding:9px 15px;border-radius:8px;font-family:var(--mono);font-size:12px;
  opacity:0;pointer-events:none;transition:opacity .25s;max-width:88%;text-align:center;}
.toast.on{opacity:1;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--dim);border-top-color:#ff5b4a;border-radius:50%;vertical-align:-2px;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.hint{position:fixed;left:50%;bottom:calc(64px + var(--sb));transform:translateX(-50%);z-index:8;font-family:var(--mono);
  font-size:11px;color:var(--dim);pointer-events:none;transition:opacity .5s;text-align:center;}
</style>
</head>
<body>
<div id="map"></div>

<div class="top"><div class="brand">震源<b>3D</b></div><div class="tsub" id="tsub">–</div></div>
<div class="tools">
  <button class="tbtn" id="btnRefresh" title="更新">⟳</button>
  <button class="tbtn" id="btnList" title="一覧">☰</button>
</div>

<div class="legend">
  <div class="t">深さ DEPTH</div>
  <div class="lr"><i style="background:#ff453a"></i>〜30km</div>
  <div class="lr"><i style="background:#ff9f0a"></i>〜70km</div>
  <div class="lr"><i style="background:#ffd60a"></i>〜150km</div>
  <div class="lr"><i style="background:#30d158"></i>〜300km</div>
  <div class="lr"><i style="background:#0a84ff"></i>〜500km</div>
  <div class="lr"><i style="background:#5e5ce6"></i>500km〜</div>
</div>

<div class="hint" id="hint">2本指で傾ける・回す / 震源をタップ</div>

<div class="info" id="info">
  <button class="x" id="infoX">×</button>
  <div class="h"><div class="dh" id="iDh"></div><div class="pl" id="iPlace">–</div></div>
  <div class="g">
    <div><span class="k">震度</span><span class="vv" id="iInt">–</span></div>
    <div><span class="k">M</span><span class="vv" id="iMag">–</span></div>
    <div><span class="k">深さ</span><span class="vv" id="iDep">–</span></div>
  </div>
  <div class="sb" id="iTime">–</div>
</div>

<div class="bg" id="bg"></div>
<div class="sheet" id="sheet">
  <div class="hd"></div>
  <div class="st">最近の地震 · <b id="cnt">–</b>件 · 更新 <b id="updated">–</b> · <b id="src">–</b></div>
  <div class="list" id="listEl"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const APP_VERSION="v7.0";
const LS_KEY="jeq_cache_v2";
const MAX_RECORDS=120, FETCH_TIMEOUT=8000, REFRESH_AFTER_MS=5*60*1000;
const BBOX={latMin:24,latMax:46,lngMin:122,lngMax:154};
const SCOL={"1":"#9aa6b2","2":"#2f9e6a","3":"#2f7fd0","4":"#e6c528","5弱":"#f0972e","5強":"#ed7424","6弱":"#e0432f","6強":"#c01f1a","7":"#9b1fb0"};
const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,"0");
const fmtTime=ms=>{const d=new Date(ms);return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;};
function scaleLabel(s){const m={10:"1",20:"2",30:"3",40:"4",45:"5弱",50:"5強",55:"6弱",60:"6強",70:"7"};return m[s]||null;}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function depthRGB(km){
  if(km<30)return[255,69,58]; if(km<70)return[255,159,10]; if(km<150)return[255,214,10];
  if(km<300)return[48,209,88]; if(km<500)return[10,132,255]; return[94,92,230];
}
function depthCss(km){const c=depthRGB(km);return `rgb(${c[0]},${c[1]},${c[2]})`;}

/* ===== データ ===== */
let DATA=[],lastFetch=0,loading=false;
function withTimeout(){if(AbortSignal.timeout)return{signal:AbortSignal.timeout(FETCH_TIMEOUT)};const c=new AbortController();setTimeout(()=>c.abort(),FETCH_TIMEOUT);return{signal:c.signal};}
async function fetchP2P(){
  const r=await fetch("https://api.p2pquake.net/v2/history?codes=551&limit=100",withTimeout());
  if(!r.ok)throw new Error("p2p "+r.status);
  const j=await r.json();const out=[];
  for(const e of j){
    const eq=e.earthquake;if(!eq||!eq.hypocenter)continue;
    const h=eq.hypocenter,lat=h.latitude,lng=h.longitude;
    if(lat==null||lng==null||lat<=-90||lng<=-180)continue;
    const t=eq.time?new Date(eq.time.replace(/-/g,"/")).getTime():Date.parse(e.time);
    if(isNaN(t))continue;
    out.push({id:e.id||(t+"_"+lat+"_"+lng),t,lat,lng,depth:(h.depth!=null&&h.depth>=0)?h.depth:10,
      mag:(h.magnitude!=null&&h.magnitude>=0)?h.magnitude:null,intensity:scaleLabel(eq.maxScale),
      place:h.name||"震源不明",src:"JMA"});
  }
  return out;
}
async function fetchUSGS(){
  const start=new Date(Date.now()-30*864e5).toISOString();
  const url="https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime="+start
    +"&minlatitude="+BBOX.latMin+"&maxlatitude="+BBOX.latMax+"&minlongitude="+BBOX.lngMin+"&maxlongitude="+BBOX.lngMax
    +"&minmagnitude=2.5&orderby=time&limit=120";
  const r=await fetch(url,withTimeout());if(!r.ok)throw new Error("usgs "+r.status);
  const j=await r.json();
  return (j.features||[]).map(f=>{const c=f.geometry.coordinates;
    return{id:f.id,t:f.properties.time,lat:c[1],lng:c[0],depth:(c[2]!=null)?c[2]:10,mag:f.properties.mag,
      intensity:null,place:f.properties.place||"震源不明",src:"USGS"};});
}
function saveCache(){try{localStorage.setItem(LS_KEY,JSON.stringify({savedAt:Date.now(),data:DATA.slice(0,MAX_RECORDS)}));}catch(e){}}
function loadCache(){try{const o=JSON.parse(localStorage.getItem(LS_KEY)||"null");if(o&&Array.isArray(o.data))return o;}catch(e){}return null;}
async function loadData(silent){
  if(loading)return;loading=true;$("btnRefresh").innerHTML='<span class="spin"></span>';
  let ok=false,src="";
  try{DATA=await fetchP2P();src="JMA";ok=true;}
  catch(e1){try{DATA=await fetchUSGS();src="USGS";ok=true;if(!silent)toast("JMA取得失敗→USGS");}catch(e2){ok=false;}}
  if(ok){DATA.sort((a,b)=>b.t-a.t);DATA=DATA.slice(0,MAX_RECORDS);lastFetch=Date.now();saveCache();$("src").textContent=src;afterData();if(!silent)toast("更新 "+DATA.length+"件");}
  else{const c=loadCache();if(c){DATA=c.data;$("src").textContent="CACHE";afterData();toast("通信失敗：保存データ");}else{toast("取得できませんでした");}}
  loading=false;$("btnRefresh").innerHTML="⟳";
}
let toastTimer=null;
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("on");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("on"),3000);}
function afterData(){
  $("cnt").textContent=DATA.length;$("updated").textContent=lastFetch?fmtTime(lastFetch):"–";
  $("tsub").textContent=DATA.length+"件 · "+(lastFetch?fmtTime(lastFetch):"–");
  renderList();updateLayers();
}
function renderList(){
  const wrap=$("listEl");wrap.innerHTML="";
  for(const q of DATA){
    const row=document.createElement("div");row.className="row";
    const lab=q.intensity,bg=lab?SCOL[lab]:"#26303c";
    const magTxt=(q.mag!=null)?"M"+q.mag.toFixed(1):"M–";
    row.innerHTML=`<div class="rb" style="background:${bg};color:${lab?'#05080d':'#8794a4'}"><span class="k">震度</span><span class="v">${lab||'–'}</span></div>
      <div class="rm"><div class="rp">${escapeHtml(q.place)}</div><div class="rs">${magTxt} · 深さ${q.depth}km</div></div>
      <div class="rt">${fmtTime(q.t)}</div>`;
    row.addEventListener("click",()=>{closeSheet();selectQuake(q,true);});
    wrap.appendChild(row);
  }
}

/* ===== 3D（MapLibre + deck.gl） ===== */
let map=null,overlay=null,selId=null;
function initMap(){
  if(typeof maplibregl==="undefined"||typeof deck==="undefined"){toast("3Dエンジン読込失敗");return;}
  map=new maplibregl.Map({
    container:"map",
    style:{version:8,
      sources:{gsi:{type:"raster",tiles:["https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png"],tileSize:256,attribution:"地理院タイル",maxzoom:18}},
      layers:[{id:"bgc",type:"background",paint:{"background-color":"#05080d"}},{id:"gsi",type:"raster",source:"gsi"}]
    },
    center:[138,37.2],zoom:4.1,pitch:58,bearing:0,maxPitch:80,minZoom:3,maxZoom:13,attributionControl:true
  });
  map.touchZoomRotate.enable();map.dragRotate.enable();
  overlay=new deck.MapboxOverlay({interleaved:false,layers:[]});
  map.addControl(overlay);
  map.on("load",()=>{ if(DATA.length)updateLayers(); });
  setTimeout(()=>{const h=$("hint");if(h)h.style.opacity="0";},6000);
}
function quakeLayers(){
  const drop=new deck.LineLayer({
    id:"drop",data:DATA,
    getSourcePosition:d=>[d.lng,d.lat,0],
    getTargetPosition:d=>[d.lng,d.lat,-(d.depth||10)*1000],
    getColor:d=>{const c=depthRGB(d.depth||10);return [c[0],c[1],c[2],70];},
    getWidth:1
  });
  const pts=new deck.ScatterplotLayer({
    id:"hypo",data:DATA,pickable:true,
    getPosition:d=>[d.lng,d.lat,-(d.depth||10)*1000],
    getRadius:d=>Math.max(2.4,((d.mag!=null)?d.mag:2.5)*1.7),
    radiusUnits:"pixels",radiusMinPixels:2.4,radiusMaxPixels:34,
    getFillColor:d=>{const c=depthRGB(d.depth||10);return [c[0],c[1],c[2],235];},
    stroked:true,getLineColor:[255,255,255,150],lineWidthUnits:"pixels",getLineWidth:0.6,
    onClick:info=>{if(info&&info.object)selectQuake(info.object,false);},
    updateTriggers:{}
  });
  const layers=[drop,pts];
  const s=DATA.find(d=>d.id===selId);
  if(s){
    layers.push(new deck.ScatterplotLayer({
      id:"sel",data:[s],
      getPosition:d=>[d.lng,d.lat,-(d.depth||10)*1000],
      getRadius:d=>Math.max(2.4,((d.mag!=null)?d.mag:2.5)*1.7)+6,
      radiusUnits:"pixels",radiusMinPixels:8,stroked:true,filled:false,
      getLineColor:[255,255,255,235],lineWidthUnits:"pixels",getLineWidth:1.6
    }));
  }
  return layers;
}
function updateLayers(){ if(overlay)overlay.setProps({layers:quakeLayers()}); }

function selectQuake(q,fly){
  selId=q.id;updateLayers();
  const c=depthRGB(q.depth||10);
  $("iDh").style.background=depthCss(q.depth||10);
  $("iPlace").textContent=q.place;
  $("iInt").textContent=q.intensity?("震度"+q.intensity):"—";
  $("iInt").style.color=q.intensity?SCOL[q.intensity]:"var(--text)";
  $("iMag").textContent=(q.mag!=null)?q.mag.toFixed(1):"—";
  $("iDep").textContent=(q.depth!=null)?q.depth+"km":"—";
  $("iTime").textContent=fmtTime(q.t)+" 発生";
  $("info").classList.add("on");
  if(fly&&map)map.flyTo({center:[q.lng,q.lat],zoom:6.2,pitch:62,duration:1500,essential:true});
}
function closeInfo(){selId=null;updateLayers();$("info").classList.remove("on");}

/* ===== シート ===== */
function openSheet(){$("sheet").classList.add("on");$("bg").classList.add("on");}
function closeSheet(){$("sheet").classList.remove("on");$("bg").classList.remove("on");}

/* ===== 起動 ===== */
function bind(){
  $("btnRefresh").addEventListener("click",()=>loadData(false));
  $("btnList").addEventListener("click",openSheet);
  $("bg").addEventListener("click",closeSheet);
  $("infoX").addEventListener("click",closeInfo);
  document.addEventListener("visibilitychange",()=>{if(!document.hidden&&Date.now()-lastFetch>REFRESH_AFTER_MS)loadData(true);});
}
window.addEventListener("load",()=>{
  bind();initMap();
  const c=loadCache();
  if(c){DATA=c.data;lastFetch=c.savedAt||0;$("src").textContent="CACHE";afterData();}
  loadData(true);
});
</script>
</body>
</html>
