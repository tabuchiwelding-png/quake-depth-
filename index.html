<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>震源 3D</title>
<meta name="description" content="日本の地震を衛星写真の3Dで再現。各観測点の実測震度を正確な位置に配置し、波の到達タイミングで点灯。県別震度は実測の最大値。データ: P2P地震情報(気象庁)＋気象庁震度観測点座標。">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/deck.gl@8.9.35/dist.min.js"></script>
<style>
:root{--ink:#05080d;--text:#eef3f8;--muted:#8794a4;--dim:#54616f;--line:#1b2733;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --sans:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
  --s1:#9aa6b2;--s2:#2f9e6a;--s3:#2f7fd0;--s4:#e6c528;--s5w:#f0972e;
  --s5s:#ed7424;--s6w:#e0432f;--s6s:#c01f1a;--s7:#9b1fb0;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--ink);color:var(--text);font-family:var(--sans);-webkit-text-size-adjust:100%;}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
#map{position:fixed;inset:0;}
.topfade{position:fixed;left:0;right:0;top:0;height:150px;z-index:5;pointer-events:none;
  background:linear-gradient(to bottom,rgba(4,7,11,.65),rgba(4,7,11,0));}
.maplibregl-ctrl-attrib{font-size:9px!important;background:rgba(5,8,13,.55)!important;}
.maplibregl-ctrl-attrib a{color:#5a83b0!important;}
.maplibregl-ctrl-bottom-right{margin-bottom:calc(2px + var(--sb));}

.top{position:fixed;left:12px;right:12px;top:calc(10px + var(--st));z-index:10;display:flex;align-items:center;gap:10px;}
.brand{font-size:16px;font-weight:700;white-space:nowrap;letter-spacing:.01em;text-shadow:0 1px 6px rgba(0,0,0,.6);}
.brand b{color:#ff5b4a;}
.ver{font-family:var(--mono);font-size:11px;color:#ff8f82;background:rgba(8,13,19,.75);border:1px solid var(--line);border-radius:7px;padding:3px 7px;backdrop-filter:blur(10px);}
.spacer{flex:1;}
.tbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:rgba(8,13,19,.75);color:var(--text);
  font-size:15px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
.tools{display:flex;gap:7px;}

.legend{position:fixed;left:12px;bottom:calc(14px + var(--sb));z-index:9;font-family:var(--mono);font-size:10px;color:var(--muted);
  background:rgba(8,13,19,.62);border:1px solid var(--line);border-radius:10px;padding:8px 10px;backdrop-filter:blur(8px);}
.lr{display:flex;align-items:center;gap:6px;margin:2px 0;}
.lr i{width:10px;height:10px;border-radius:3px;}

/* 浮きパネル（左上・半透明・地図を透かす） */
.bgt{position:fixed;inset:0;z-index:14;background:transparent;pointer-events:none;}
.bgt.on{pointer-events:auto;}
.flypanel{position:fixed;left:12px;top:calc(58px + var(--st));z-index:16;width:min(340px,82vw);max-height:calc(100vh - 210px);
  background:rgba(9,14,20,.66);border:1px solid rgba(255,255,255,.09);border-radius:16px;
  backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
  box-shadow:0 16px 44px rgba(0,0,0,.45);display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(-120%) scale(.97);opacity:0;transition:transform .28s cubic-bezier(.2,.85,.25,1),opacity .22s;}
.flypanel.on{transform:translateX(0) scale(1);opacity:1;}
.flypanel.fp-wide{width:min(380px,86vw);}
.fp-head{display:flex;align-items:center;gap:8px;padding:12px 12px 8px;border-bottom:1px solid rgba(255,255,255,.06);}
.fp-title{flex:1;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fp-x{flex:0 0 26px;height:26px;border:0;background:transparent;color:var(--muted);font-size:16px;}

.minibar{position:fixed;left:10px;right:10px;bottom:calc(10px + var(--sb));z-index:12;background:rgba(8,13,19,.92);
  border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(12px);box-shadow:0 8px 30px rgba(0,0,0,.5);
  padding:8px 10px;transform:translateY(170%);transition:transform .3s cubic-bezier(.2,.85,.25,1);}
.minibar.on{transform:translateY(0);}
.mb-top{display:flex;align-items:center;gap:9px;}
.mb-chip{flex:0 0 auto;min-width:42px;height:34px;padding:0 8px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:13px;color:#05080d;background:#26303c;}
.mb-main{flex:1;min-width:0;}
.mb-place{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mb-sub{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.mb-play{flex:0 0 36px;height:36px;border-radius:9px;border:0;background:#ff5b4a;color:#05080d;font-size:14px;font-weight:600;}
.mb-spd{flex:0 0 auto;height:36px;min-width:40px;border-radius:9px;border:1px solid var(--line);background:#0d141c;color:var(--text);font-family:var(--mono);font-weight:600;font-size:11px;}
.mb-x{flex:0 0 28px;height:30px;border:0;background:transparent;color:var(--muted);font-size:17px;}
.mb-bot{display:flex;align-items:center;gap:9px;margin-top:7px;}
.mb-tl{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:#1c2935;}
.mb-tl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#ff5b4a;border:0;}
.mb-link{flex:0 0 auto;height:27px;padding:0 11px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:11px;font-weight:700;font-family:var(--sans);}

.gg{display:flex;flex-wrap:wrap;gap:12px 16px;padding:12px 14px 8px;font-size:12px;}
.gg div{display:flex;flex-direction:column;gap:1px;}
.gg .k{font-size:9px;color:var(--dim);font-family:var(--mono);}
.gg .v{font-family:var(--mono);font-weight:600;font-size:13px;}

.infobody{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:14px;}
.sec{font-family:var(--mono);font-size:10px;color:#39e0c6;letter-spacing:.06em;padding:14px 14px 6px;border-top:1px solid rgba(255,255,255,.06);margin-top:2px;}
.plist{padding:0 14px;font-family:var(--mono);font-size:12px;}
.stattext{padding:2px 14px 8px;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.7;}
.bars{padding:0 14px 4px;}
.barrow{display:flex;align-items:center;gap:8px;margin:3px 0;font-family:var(--mono);font-size:10px;}
.barrow .bl{flex:0 0 30px;color:var(--muted);text-align:right;}
.barrow .bt{flex:1;height:9px;background:#131c26;border-radius:3px;overflow:hidden;}
.barrow .bt i{display:block;height:100%;border-radius:3px;}
.barrow .bn{flex:0 0 22px;color:var(--dim);}
.chart{width:100%;height:200px;display:block;margin-top:2px;}
.annote{font-family:var(--mono);font-size:10px;color:var(--dim);line-height:1.6;padding:8px 14px 0;}
.stationnote{font-family:var(--mono);font-size:11px;color:#eef3f8;padding:8px 14px 2px;min-height:1px;}
.plh{font-size:9px;color:var(--dim);letter-spacing:.05em;padding:2px 0 6px;}
.prow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #151f2a;}
.prow:last-child{border:none;}
.pn{color:var(--muted);}
.pv{font-weight:600;}

.bg{position:fixed;inset:0;background:rgba(2,4,7,.55);z-index:20;opacity:0;pointer-events:none;transition:opacity .25s;}
.bg.on{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:30;height:78%;background:var(--ink);border-top:1px solid var(--line);
  border-radius:18px 18px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.85,.25,1);display:flex;flex-direction:column;}
.sheet.on{transform:translateY(0);}
.hd{width:38px;height:4px;border-radius:2px;background:#283643;margin:10px auto 4px;}
.stt{text-align:center;font-family:var(--mono);font-size:10px;color:var(--dim);padding-bottom:8px;}
.stt b{color:var(--muted);}
.list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 12px calc(18px + var(--sb));}
.row{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid #101a24;}
.row:active{background:#0a121a;}
.rb{flex:0 0 auto;width:42px;height:42px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;color:#05080d;}
.rb.dim{background:#26303c;color:#8794a4;}
.rb .k{font-family:var(--mono);font-size:8px;font-weight:600;}.rb .v{font-family:var(--mono);font-weight:600;font-size:17px;}
.rm{flex:1;min-width:0;}
.rp{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rs{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;}
.rt{flex:0 0 auto;font-family:var(--mono);font-size:11px;color:var(--dim);}

.toast{position:fixed;left:50%;bottom:calc(20px + var(--sb));transform:translateX(-50%);z-index:40;background:#0c151e;
  border:1px solid var(--line);color:var(--text);padding:9px 15px;border-radius:8px;font-family:var(--mono);font-size:12px;
  opacity:0;pointer-events:none;transition:opacity .25s;max-width:88%;text-align:center;}
.toast.on{opacity:1;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--dim);border-top-color:#ff5b4a;border-radius:50%;vertical-align:-2px;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.hint{position:fixed;left:50%;bottom:calc(70px + var(--sb));transform:translateX(-50%);z-index:8;font-family:var(--mono);
  font-size:11px;color:var(--dim);pointer-events:none;transition:opacity .6s;text-align:center;background:rgba(5,8,13,.5);padding:5px 10px;border-radius:6px;}
</style>
</head>
<body>
<div id="map"></div>
<div class="topfade"></div>

<div class="top">
  <div class="brand">震源<b>3D</b></div>
  <div class="ver" id="ver">v9.6</div>
  <div class="spacer"></div>
  <div class="tools">
    <button class="tbtn" id="btnRefresh" title="更新">⟳</button>
    <button class="tbtn" id="btnList" title="一覧">☰</button>
  </div>
</div>

<div class="legend" id="legend">
  <div class="lr"><i style="background:var(--s7)"></i>7</div>
  <div class="lr"><i style="background:var(--s6s)"></i>6強</div>
  <div class="lr"><i style="background:var(--s6w)"></i>6弱</div>
  <div class="lr"><i style="background:var(--s5s)"></i>5強</div>
  <div class="lr"><i style="background:var(--s5w)"></i>5弱</div>
  <div class="lr"><i style="background:var(--s4)"></i>4</div>
  <div class="lr"><i style="background:var(--s3)"></i>3</div>
  <div class="lr"><i style="background:var(--s2)"></i>2</div>
  <div class="lr"><i style="background:var(--s1)"></i>1</div>
</div>

<div class="hint" id="hint">2本指で傾ける・回す / 震源をタップ</div>

<!-- 最小バー（選択中だけ・地図を主役に） -->
<div class="minibar" id="minibar">
  <div class="mb-top">
    <div class="mb-chip" id="mbChip">–</div>
    <div class="mb-main">
      <div class="mb-place" id="mbPlace">–</div>
      <div class="mb-sub" id="mbSub">–</div>
    </div>
    <button class="mb-play" id="playBtn">▶</button>
    <button class="mb-spd" id="spdBtn">×2</button>
    <button class="mb-x" id="cX">×</button>
  </div>
  <div class="mb-bot">
    <input class="mb-tl" id="tl" type="range" min="0" max="1000" value="0">
    <button class="mb-link" id="btnDetail">詳細</button>
  </div>
</div>

<!-- 情報パネル（浮き・半透明・左上／タブ切替なし・全部テキストで通し表示） -->
<div class="bgt" id="infobg"></div>
<div class="flypanel fp-wide" id="infopanel">
  <div class="fp-head"><div class="fp-title" id="infoTitle">–</div><button class="fp-x" id="infoX">×</button></div>
  <div class="infobody" id="infobody">
    <div class="gg">
      <div><span class="k">最大震度</span><span class="v" id="cInt">–</span></div>
      <div><span class="k">M</span><span class="v" id="cMag">–</span></div>
      <div><span class="k">深さ</span><span class="v" id="cDep">–</span></div>
      <div><span class="k">観測点</span><span class="v" id="cPts">–</span></div>
      <div><span class="k">発生</span><span class="v" id="cTime">–</span></div>
      <div><span class="k">震源位置</span><span class="v" id="cLoc">–</span></div>
    </div>
    <div class="sec" id="secPref">県別の実測最大震度</div>
    <div class="plist" id="plist"></div>
    <div class="sec">観測点の統計</div>
    <div class="stattext" id="stattext">–</div>
    <div class="bars" id="bars"></div>
    <div class="sec">震央距離 × 実測震度（分析）</div>
    <canvas id="chart" class="chart"></canvas>
    <div class="annote" id="annote">シアン＝理論減衰（司・翠川1999）／点＝各観測点の実測震度。点が曲線より上＝地盤などで増幅、下＝減衰。</div>
    <div class="stationnote" id="stationnote"></div>
  </div>
</div>

<div class="bg" id="bg"></div>
<div class="sheet" id="sheet">
  <div class="hd"></div>
  <div class="stt">最近の地震 · <b id="cnt">–</b>件 · 更新 <b id="updated">–</b></div>
  <div class="list" id="listEl"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== 設定 ===== */
const APP_VERSION="v9.6";
const LS_KEY="jeq_cache_v3";
const LS_ST="jeq_stations_v1";
const MAX_RECORDS=120, FETCH_TIMEOUT=9000, REFRESH_AFTER_MS=5*60*1000;
const BBOX={latMin:24,latMax:46,lngMin:122,lngMax:154};
const VP=6.9, VS=3.9;  // km/s 代表値
const SCOL={"1":"#9aa6b2","2":"#2f9e6a","3":"#2f7fd0","4":"#e6c528","5弱":"#f0972e","5強":"#ed7424","6弱":"#e0432f","6強":"#c01f1a","7":"#9b1fb0"};
const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,"0");
const fmtTime=ms=>{const d=new Date(ms);return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function scaleLabel(s){const m={10:"1",20:"2",30:"3",40:"4",45:"5弱",46:"5弱",50:"5強",55:"6弱",60:"6強",70:"7"};return m[s]||null;}
function scaleNum(s){const m={10:1,20:2,30:3,40:4,45:4.75,46:4.75,50:5.25,55:5.75,60:6.25,70:7};return m[s]||0;}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function hex2rgb(h){const n=parseInt(h.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];}
/* 理論減衰式（司・翠川1999）: 震央距離deltaと深さDから理論震度を計算。分析タブの比較曲線に使用 */
function pgv(M,D,X){const lv=0.58*M+0.0038*D-1.29-Math.log10(X+0.0028*Math.pow(10,0.5*M))-0.002*X;return Math.pow(10,lv)*1.4;}
function shindoAt(M,D,delta){const X=Math.sqrt(delta*delta+D*D);const v=pgv(M,D,X);if(v<=0)return 0;return 2.68+1.72*Math.log10(v);}
function colNum(I){ // 連続震度→色（観測点バケットの色付けに使用）
  if(I>=6.5)return hex2rgb("#9b1fb0"); if(I>=6.0)return hex2rgb("#c01f1a"); if(I>=5.5)return hex2rgb("#e0432f");
  if(I>=5.0)return hex2rgb("#ed7424"); if(I>=4.5)return hex2rgb("#f0972e"); if(I>=3.5)return hex2rgb("#e6c528");
  if(I>=2.5)return hex2rgb("#2f7fd0"); if(I>=1.5)return hex2rgb("#2f9e6a"); return hex2rgb("#9aa6b2");
}
/* 連続カラーランプ（補間面用・なめらか） */
function rampColor(I){
  const R=[[0.5,[120,134,148]],[1.5,[154,166,178]],[2.5,[47,158,106]],[3.5,[47,127,208]],[4.5,[230,197,40]],[5.0,[240,151,46]],[5.5,[224,67,47]],[6.0,[192,31,26]],[6.5,[155,31,176]],[7,[170,40,190]]];
  if(I<=R[0][0])return R[0][1];
  for(let i=0;i<R.length-1;i++){const a=R[i][0],ca=R[i][1],b=R[i+1][0],cb=R[i+1][1];
    if(I>=a&&I<=b){const t=(b-a)?(I-a)/(b-a):0;return[ca[0]+(cb[0]-ca[0])*t,ca[1]+(cb[1]-ca[1])*t,ca[2]+(cb[2]-ca[2])*t];}}
  return R[R.length-1][1];
}

/* ===== 観測点座標（初回のみ取得→localStorage） ===== */
let STATIONS=null;
async function loadStations(){
  try{const s=localStorage.getItem(LS_ST);if(s){STATIONS=JSON.parse(s);return;}}catch(e){}
  const urls=[
    "https://gist.githubusercontent.com/iku55/79005d1896631ad6117bbe327b8162c1/raw/stations.json",
    "https://raw.githubusercontent.com/iku55/jma_int_stations/main/stations.json",
    "https://raw.githubusercontent.com/iku55/jma_int_stations/master/stations.json",
    "https://raw.githubusercontent.com/iku55/jma_int_stations/main/data/stations.json"
  ];
  for(const u of urls){
    try{
      const r=await fetch(u,withTimeout());if(!r.ok)continue;
      const j=await r.json();
      const map={};
      const arr=Array.isArray(j)?j:(j.stations||[]);
      for(const o of arr){if(o&&o.name&&o.lat!=null&&o.lon!=null){const la=parseFloat(o.lat),lo=parseFloat(o.lon);if(!isNaN(la)&&!isNaN(lo))map[o.name]=[la,lo];}}
      if(Object.keys(map).length>500){STATIONS=map;try{localStorage.setItem(LS_ST,JSON.stringify(map));}catch(e){}return;}
    }catch(e){}
  }
  STATIONS=null;
}

/* ===== データ取得 ===== */
let DATA=[],lastFetch=0,loading=false;
function withTimeout(){if(AbortSignal.timeout)return{signal:AbortSignal.timeout(FETCH_TIMEOUT)};const c=new AbortController();setTimeout(()=>c.abort(),FETCH_TIMEOUT);return{signal:c.signal};}
async function fetchP2P(){
  const r=await fetch("https://api.p2pquake.net/v2/history?codes=551&limit=100",withTimeout());
  if(!r.ok)throw new Error("p2p "+r.status);
  const j=await r.json();const out=[];
  for(const e of j){
    const eq=e.earthquake;if(!eq||!eq.hypocenter)continue;
    const h=eq.hypocenter,lat=h.latitude,lng=h.longitude;
    const t=eq.time?new Date(eq.time.replace(/-/g,"/")).getTime():Date.parse(e.time);
    if(isNaN(t))continue;
    const pts=Array.isArray(e.points)?e.points:[];
    out.push({id:e.id||(t+"_"+lat+"_"+lng),t,
      lat:(lat!=null&&lat>-90)?lat:null,lng:(lng!=null&&lng>-180)?lng:null,
      depth:(h.depth!=null&&h.depth>=0)?h.depth:10,
      mag:(h.magnitude!=null&&h.magnitude>=0)?h.magnitude:null,intensity:scaleLabel(eq.maxScale),
      place:h.name||"震源不明",points:pts,src:"JMA"});
  }
  return out;
}
function saveCache(){try{localStorage.setItem(LS_KEY,JSON.stringify({savedAt:Date.now(),data:DATA.slice(0,MAX_RECORDS)}));}catch(e){}}
function loadCache(){try{const o=JSON.parse(localStorage.getItem(LS_KEY)||"null");if(o&&Array.isArray(o.data))return o;}catch(e){}return null;}
async function loadData(silent){
  if(loading)return;loading=true;$("btnRefresh").innerHTML='<span class="spin"></span>';
  let ok=false;
  try{DATA=await fetchP2P();ok=true;}catch(e1){ok=false;}
  if(ok){DATA.sort((a,b)=>b.t-a.t);DATA=DATA.slice(0,MAX_RECORDS);lastFetch=Date.now();saveCache();afterData();if(!silent)toast("更新 "+DATA.length+"件");}
  else{const c=loadCache();if(c){DATA=c.data;lastFetch=c.savedAt||0;afterData();toast("保存データを表示");}else{toast("取得できませんでした");}}
  loading=false;$("btnRefresh").innerHTML="⟳";
}
let toastTimer=null;
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("on");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("on"),3000);}
function afterData(){
  $("cnt").textContent=DATA.length;$("updated").textContent=lastFetch?fmtTime(lastFetch):"–";
  renderList();updateLayers();
}
function renderList(){
  const wrap=$("listEl");wrap.innerHTML="";
  for(const q of DATA){
    const row=document.createElement("div");row.className="row";
    const lab=q.intensity,rbcls=lab?"":" dim",bg=lab?SCOL[lab]:"";
    const magTxt=(q.mag!=null)?"M"+q.mag.toFixed(1):"M–";
    row.innerHTML=`<div class="rb${rbcls}" style="${bg?'background:'+bg+';color:#05080d':''}"><span class="k">震度</span><span class="v">${lab||'–'}</span></div>
      <div class="rm"><div class="rp">${escapeHtml(q.place)}</div><div class="rs">${magTxt} · ${q.depth}km · ${q.points?q.points.length:0}観測点</div></div>
      <div class="rt">${fmtTime(q.t)}</div>`;
    row.addEventListener("click",()=>{closeSheet();selectQuake(q,true);});
    wrap.appendChild(row);
  }
}

/* ===== 地図 ===== */
let map=null,overlay=null;
function initMap(){
  if(typeof maplibregl==="undefined"||typeof deck==="undefined"){toast("地図エンジン読込失敗");return;}
  map=new maplibregl.Map({
    container:"map",
    style:{version:8,
      sources:{sat:{type:"raster",tiles:["https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg"],tileSize:256,attribution:"地理院タイル",maxzoom:18}},
      layers:[{id:"bgc",type:"background",paint:{"background-color":"#0a1622"}},{id:"sat",type:"raster",source:"sat"}]
    },
    center:[138,37.2],zoom:4.3,pitch:55,bearing:0,maxPitch:80,minZoom:3,maxZoom:13,attributionControl:true
  });
  map.touchZoomRotate.enable();map.dragRotate.enable();
  overlay=new deck.MapboxOverlay({interleaved:true,layers:[]});
  map.addControl(overlay);
  map.on("load",()=>updateLayers());
  setTimeout(()=>{const h=$("hint");if(h)h.style.opacity="0";},6000);
}

/* ===== 選択・実測再生 ===== */
let sel=null,obs=[],tEnd=10,tSim=0,playing=false,speed=2,raf=null,lastTs=0;
let fieldImg=null,fieldBounds=null,lastReached=-1;
function reachedPts(){const reveal=playing||tSim>0;return reveal?obs.filter(o=>tSim>=o.tS):obs;}
function rebuildField(){
  if(!sel||!obs.length){fieldImg=null;return;}
  const pts=reachedPts();
  if(!pts.length){fieldImg=null;return;}
  let minLa=sel.lat,maxLa=sel.lat,minLo=sel.lng,maxLo=sel.lng;
  for(const o of obs){minLa=Math.min(minLa,o.lat);maxLa=Math.max(maxLa,o.lat);minLo=Math.min(minLo,o.lng);maxLo=Math.max(maxLo,o.lng);}
  const mLa=(maxLa-minLa)*0.15+0.25,mLo=(maxLo-minLo)*0.15+0.25;
  minLa-=mLa;maxLa+=mLa;minLo-=mLo;maxLo+=mLo;
  const W=224,H=224,cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const ctx=cv.getContext("2d"),img=ctx.createImageData(W,H),d=img.data;
  const grid=new Float64Array(W*H);grid.fill(NaN);
  const D=(sel.depth!=null)?sel.depth:10;
  const dS=(VS*tSim>D)?Math.sqrt((VS*tSim)**2-D*D):1e9;
  const reveal=playing||tSim>0;
  const cl=Math.cos(sel.lat*Math.PI/180);
  for(let y=0;y<H;y++){
    const lat=maxLa-(maxLa-minLa)*(y/(H-1));
    for(let x=0;x<W;x++){
      const lng=minLo+(maxLo-minLo)*(x/(W-1));
      const idx=(y*W+x)*4;
      const de=Math.sqrt((lat-sel.lat)**2+((lng-sel.lng)*cl)**2)*111;
      if(reveal&&de>dS+28){d[idx+3]=0;continue;}
      const edgeFeather=reveal?clamp((dS+28-de)/28,0,1):1;
      let num=0,den=0,near=999;
      for(const o of pts){
        const dd=Math.sqrt((lat-o.lat)**2+((lng-o.lng)*cl)**2)*111;
        if(dd<near)near=dd;
        const w=1/Math.pow(dd+1.5,2.15);num+=w*o.I;den+=w;
      }
      if(den<=0||near>85){d[idx+3]=0;continue;}
      const nearFeather=clamp((85-near)/22,0,1);
      const I=num/den,c=rampColor(I),a=clamp((I-0.3)/6.3,0,1);
      grid[y*W+x]=I;
      d[idx]=c[0]|0;d[idx+1]=c[1]|0;d[idx+2]=c[2]|0;
      d[idx+3]=Math.round((60+a*195)*edgeFeather*nearFeather);
    }
  }
  ctx.putImageData(img,0,0);
  // 等値線（マーチングスクエア・0.5刻み）
  for(let L=1.0;L<=6.5;L+=0.5){
    const major=Math.abs(L-Math.round(L))<0.01;
    ctx.strokeStyle=major?"rgba(255,255,255,0.6)":"rgba(255,255,255,0.26)";
    ctx.lineWidth=major?0.9:0.6;ctx.beginPath();
    for(let y=0;y<H-1;y++)for(let x=0;x<W-1;x++){
      const v0=grid[y*W+x],v1=grid[y*W+x+1],v2=grid[(y+1)*W+x+1],v3=grid[(y+1)*W+x];
      if(isNaN(v0)||isNaN(v1)||isNaN(v2)||isNaN(v3))continue;
      const p=[];
      if((v0<L)!==(v1<L)){const t=(L-v0)/(v1-v0);p.push([x+t,y]);}
      if((v1<L)!==(v2<L)){const t=(L-v1)/(v2-v1);p.push([x+1,y+t]);}
      if((v2<L)!==(v3<L)){const t=(L-v2)/(v3-v2);p.push([x+1-t,y+1]);}
      if((v3<L)!==(v0<L)){const t=(L-v3)/(v0-v3);p.push([x,y+1-t]);}
      if(p.length>=2){ctx.moveTo(p[0][0],p[0][1]);ctx.lineTo(p[1][0],p[1][1]);}
      if(p.length===4){ctx.moveTo(p[2][0],p[2][1]);ctx.lineTo(p[3][0],p[3][1]);}
    }
    ctx.stroke();
  }
  fieldImg=cv;fieldBounds=[minLo,minLa,maxLo,maxLa];
}
function buildObs(q){
  const arr=[];
  if(!q.points||q.lat==null||q.lng==null)return arr;
  const D=(q.depth!=null)?q.depth:10;
  for(const p of q.points){
    if(p.isArea)continue;
    const c=STATIONS?STATIONS[p.addr]:null;
    if(!c)continue;
    const delta=Math.sqrt((c[0]-q.lat)**2+((c[1]-q.lng)*Math.cos(q.lat*Math.PI/180))**2)*111;
    const slant=Math.sqrt(delta*delta+D*D);
    arr.push({lat:c[0],lng:c[1],scale:p.scale,I:scaleNum(p.scale),tS:slant/VS,delta,name:p.addr||"観測点",pref:p.pref||""});
  }
  return arr;
}
function prefMax(q){
  const m={};
  for(const p of (q.points||[])){if(!p.pref)continue;if(m[p.pref]==null||p.scale>m[p.pref])m[p.pref]=p.scale;}
  return Object.entries(m).map(([pref,scale])=>({pref,scale})).sort((a,b)=>b.scale-a.scale);
}
function renderPref(q){
  const ps=prefMax(q);const wrap=$("plist");
  if(!ps.length){wrap.innerHTML='<div class="plh">この地震の観測点別データはありません</div>';return;}
  let html='<div class="plh">県別の実測最大震度（'+ps.length+'県）</div>';
  for(const r of ps){const lab=scaleLabel(r.scale)||"–";const col=SCOL[lab]||"#8794a4";
    html+=`<div class="prow"><span class="pn">${escapeHtml(r.pref)}</span><span class="pv" style="color:${col}">震度${lab}</span></div>`;}
  wrap.innerHTML=html;
}

/* ===== 観測点の統計（実測データから計算・テキストで説明） ===== */
function stationStats(){
  if(!obs.length)return null;
  const vals=obs.map(o=>o.I);
  const n=vals.length;
  const mean=vals.reduce((a,b)=>a+b,0)/n;
  const max=Math.max(...vals),min=Math.min(...vals);
  const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0)/n);
  const M=(sel.mag!=null)?sel.mag:4.5,D=(sel.depth!=null)?sel.depth:10;
  let sumRes=0;for(const o of obs)sumRes+=(o.I-shindoAt(M,D,o.delta));
  const meanRes=sumRes/n;
  return {n,mean,max,min,sd,meanRes};
}
function renderStats(){
  const s=stationStats();
  if(!s){$("stattext").textContent="観測点データなし";$("bars").innerHTML="";return;}
  let resTxt;
  if(Math.abs(s.meanRes)<0.15)resTxt="実測は理論減衰とほぼ一致しています。";
  else if(s.meanRes>=0.15)resTxt="実測は理論より平均+"+s.meanRes.toFixed(2)+"大きい傾向（地盤や地形の影響が考えられます）。";
  else resTxt="実測は理論より平均"+s.meanRes.toFixed(2)+"小さい傾向です。";
  $("stattext").innerHTML=
    "観測点 "+s.n+"件　平均震度 "+s.mean.toFixed(2)+"　最大 "+s.max.toFixed(1)+"　最小 "+s.min.toFixed(1)+"　標準偏差 "+s.sd.toFixed(2)+"<br>"+resTxt;
  const order=["7","6強","6弱","5強","5弱","4","3","2","1"];
  const counts={};for(const k of order)counts[k]=0;
  for(const o of obs){const lab=scaleLabel(o.scale);if(lab&&counts[lab]!=null)counts[lab]++;}
  const maxC=Math.max(1,...order.map(k=>counts[k]));
  let html="";
  for(const k of order){const c=counts[k];if(!c)continue;
    const pct=Math.round((c/maxC)*100);
    html+=`<div class="barrow"><span class="bl">${k}</span><div class="bt"><i style="width:${pct}%;background:${SCOL[k]}"></i></div><span class="bn">${c}</span></div>`;}
  $("bars").innerHTML=html||'<div class="plh">内訳なし</div>';
}
function showStationDetail(o){
  const lab=scaleLabel(o.scale)||"—";
  const msg=(o.name||"観測点")+" ・ 震度"+lab+" ・ 震央から"+Math.round(o.delta)+"km";
  if($("infopanel").classList.contains("on")){$("stationnote").textContent="タップした観測点: "+msg;}
  else toast(msg);
}
function updateMiniSub(){
  if(!sel)return;
  if(playing||tSim>0){
    $("mbSub").textContent="経過 "+tSim.toFixed(1)+"s · 到達 "+reached()+"/"+obs.length;
  }else{
    const m=(sel.mag!=null)?"M"+sel.mag.toFixed(1):"M–";
    $("mbSub").textContent=m+" · 深"+(sel.depth!=null?sel.depth:"–")+"km · "+obs.length+"観測点";
  }
}
function drawChart(){
  const cv=$("chart");if(!cv||!sel)return;
  const dpr=window.devicePixelRatio||1;
  const w=cv.clientWidth||320,h=210;
  cv.width=Math.round(w*dpr);cv.height=Math.round(h*dpr);
  const ctx=cv.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  const padL=26,padB=22,padT=8,padR=8;
  const maxD=Math.max(60,...obs.map(o=>o.delta||0))*1.05;
  const X=dd=>padL+(w-padL-padR)*(dd/maxD);
  const Y=I=>padT+(h-padT-padB)*(1-clamp(I,0,7.2)/7.2);
  ctx.font="9px ui-monospace,monospace";
  // y軸グリッド（震度）
  ctx.strokeStyle="#16222e";ctx.lineWidth=1;ctx.fillStyle="#54616f";
  for(let I=0;I<=7;I++){const y=Y(I);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padR,y);ctx.stroke();ctx.fillText(I,6,y+3);}
  // x軸目盛
  const step=maxD>400?100:(maxD>150?50:20);
  for(let dd=0;dd<=maxD;dd+=step){const x=X(dd);ctx.fillText(Math.round(dd),x-7,h-7);}
  // 理論減衰曲線（司・翠川）
  const M=(sel.mag!=null)?sel.mag:4.5,D=(sel.depth!=null)?sel.depth:10;
  ctx.strokeStyle="#39e0c6";ctx.lineWidth=1.6;ctx.beginPath();
  let started=false;
  for(let dd=0;dd<=maxD;dd+=Math.max(1,maxD/240)){const I=shindoAt(M,D,dd);const x=X(dd),y=Y(I);if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);}
  ctx.stroke();
  // 実測点
  for(const o of obs){const c=colNum(o.I);ctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;
    ctx.beginPath();ctx.arc(X(o.delta),Y(o.I),3.2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="rgba(5,8,13,.8)";ctx.lineWidth=.6;ctx.stroke();}
  // 軸ラベル
  ctx.fillStyle="#8794a4";ctx.fillText("震度",6,padT+4);ctx.fillText("震央距離 km →",w-86,h-7);
}

let cachedShown=null,cachedShownN=-2;
function obsLayers(){
  if(!sel)return [];
  const reveal=playing||tSim>0;
  const rc=reveal?reached():-1;
  if(rc!==cachedShownN){cachedShownN=rc;cachedShown=reveal?obs.filter(o=>tSim>=o.tS):obs;}
  const shown=cachedShown;
  const dots=new deck.ScatterplotLayer({
    id:"obs",data:shown,pickable:true,
    getPosition:o=>[o.lng,o.lat,0],
    getRadius:o=>3+o.I*1.1,radiusUnits:"pixels",radiusMinPixels:2.5,
    getFillColor:o=>{const c=colNum(o.I);return [c[0],c[1],c[2],235];},
    stroked:true,getLineColor:[10,16,23,200],lineWidthUnits:"pixels",getLineWidth:.5,
    onClick:info=>{if(info&&info.object)showStationDetail(info.object);},
    updateTriggers:{getFillColor:[1]}
  });
  const layers=[];
  if(fieldImg&&fieldBounds){
    layers.push(new deck.BitmapLayer({id:"field",image:fieldImg,bounds:fieldBounds,opacity:0.84,parameters:{depthTest:false}}));
  }
  layers.push(dots);
  // 震源（地中）＋震央
  layers.push(new deck.ScatterplotLayer({
    id:"hypo",data:[sel],getPosition:q=>[q.lng,q.lat,-(q.depth||10)*1000],
    getRadius:9,radiusUnits:"pixels",stroked:true,getLineColor:[255,255,255,235],
    getFillColor:[255,90,74,230],lineWidthUnits:"pixels",getLineWidth:1.4,parameters:{depthTest:false}
  }));
  return layers;
}
function overviewLayer(){
  const pts=new deck.ScatterplotLayer({
    id:"all",data:DATA.filter(q=>q.lat!=null),pickable:true,
    getPosition:q=>[q.lng,q.lat,-(q.depth||10)*1000],
    getRadius:q=>{const d=(q.depth!=null)?q.depth:10;return Math.max(2,Math.min(10,4+d/50));},
    radiusUnits:"pixels",radiusMinPixels:2,radiusMaxPixels:14,
    getFillColor:q=>{const c=q.intensity?hex2rgb(SCOL[q.intensity]):[120,134,148];return q.intensity?[c[0],c[1],c[2],220]:[c[0],c[1],c[2],130];},
    stroked:true,getLineColor:[255,255,255,130],lineWidthUnits:"pixels",getLineWidth:.5,
    onClick:info=>{if(info&&info.object)selectQuake(info.object,false);}
  });
  return [pts];
}
function updateLayers(){ if(overlay)overlay.setProps({layers: sel?obsLayers():overviewLayer()}); }

function selectQuake(q,fly){
  sel=q; obs=buildObs(q); tSim=0;
  obs.sort((a,b)=>a.tS-b.tS);
  fieldImg=null;lastReached=-1;cachedShown=null;cachedShownN=-2;
  tEnd=obs.length?obs[obs.length-1].tS+3:10;
  $("cInt").textContent=q.intensity?("震度"+q.intensity):"—";
  $("cInt").style.color=q.intensity?SCOL[q.intensity]:"var(--text)";
  $("cMag").textContent=(q.mag!=null)?q.mag.toFixed(1):"—";
  $("cDep").textContent=(q.depth!=null)?q.depth+"km":"—";
  $("cPts").textContent=obs.length?obs.length:"—";
  $("cTime").textContent=fmtTime(q.t);
  $("cLoc").textContent=(q.lat!=null&&q.lng!=null)?(q.lat.toFixed(2)+"N "+q.lng.toFixed(2)+"E"):"—";
  renderPref(q);
  renderStats();
  $("stationnote").textContent="";
  // 最小バー
  $("mbChip").textContent=q.intensity?("震度"+q.intensity):"震度?";
  $("mbChip").style.background=q.intensity?SCOL[q.intensity]:"#26303c";
  $("mbChip").style.color=q.intensity?"#05080d":"#8794a4";
  $("mbPlace").textContent=q.place;
  $("infoTitle").textContent=q.place;
  $("minibar").classList.add("on");
  $("legend").style.display="none";
  closeSheets();
  updateMiniSub();
  updateLayers();
  if(fly&&map)map.flyTo({center:[q.lng,q.lat],zoom:Math.max(map.getZoom(),6),pitch:60,duration:1500,essential:true});
  if(obs.length)setPlaying(true);
  setTimeout(drawChart,60);
}
function closeCard(){sel=null;obs=[];fieldImg=null;setPlaying(false);$("minibar").classList.remove("on");$("legend").style.display="";closeSheets();updateLayers();}

let lastLayerTs=0;
function reached(){return obs.filter(o=>tSim>=o.tS).length;}
function tick(ts){
  if(!playing)return;
  if(!lastTs)lastTs=ts;
  const dt=(ts-lastTs)/1000;lastTs=ts;tSim+=dt*speed;
  const rc=reached();
  if(rc!==lastReached){lastReached=rc;rebuildField();}
  updateMiniSub();
  $("tl").value=Math.round(clamp(tSim/tEnd,0,1)*1000);
  if(ts-lastLayerTs>32){lastLayerTs=ts;updateLayers();}
  if(tSim>=tEnd){updateLayers();setPlaying(false);return;}
  raf=requestAnimationFrame(tick);
}
function setPlaying(p){playing=p;$("playBtn").textContent=p?"❚❚":"▶";cancelAnimationFrame(raf);if(p){if(tSim>=tEnd)tSim=0;lastTs=0;raf=requestAnimationFrame(tick);}}
function togglePlay(){if(sel&&obs.length)setPlaying(!playing);}
function cycleSpeed(){const s=[1,2,4,8];speed=s[(s.indexOf(speed)+1)%s.length];$("spdBtn").textContent="×"+speed;}

function closeSheets(){
  ["sheet","infopanel"].forEach(id=>$(id).classList.remove("on"));
  $("bg").classList.remove("on");$("infobg").classList.remove("on");
}
function openSheet(){closeSheets();$("sheet").classList.add("on");$("bg").classList.add("on");}
function openInfo(){if(!sel)return;closeSheets();$("infopanel").classList.add("on");$("infobg").classList.add("on");setTimeout(drawChart,60);}
function closeSheet(){closeSheets();}

function bind(){
  $("btnRefresh").addEventListener("click",()=>loadData(false));
  $("btnList").addEventListener("click",openSheet);
  $("bg").addEventListener("click",closeSheet);
  $("infobg").addEventListener("click",closeSheet);
  $("infoX").addEventListener("click",closeSheet);
  $("cX").addEventListener("click",closeCard);
  $("btnDetail").addEventListener("click",openInfo);
  $("playBtn").addEventListener("click",togglePlay);
  $("spdBtn").addEventListener("click",cycleSpeed);
  $("spdBtn").textContent="×"+speed;
  $("tl").addEventListener("input",e=>{if(!sel)return;setPlaying(false);tSim=e.target.value/1000*tEnd;
    lastReached=reached();rebuildField();updateMiniSub();updateLayers();});
  document.addEventListener("visibilitychange",()=>{if(!document.hidden&&Date.now()-lastFetch>REFRESH_AFTER_MS)loadData(true);});
}
window.addEventListener("load",async()=>{
  bind();initMap();
  const c=loadCache();
  if(c){DATA=c.data;lastFetch=c.savedAt||0;afterData();}
  await loadStations();
  if(!STATIONS)toast("観測点座標の取得に失敗（点の位置がずれる場合あり）");
  loadData(true);
});
</script>
